services:
  # Frontend en modo web (solo UI, sin Tauri/Rust)
  # Útil para desarrollar la interfaz sin compilar Rust
  frontend:
    image: node:20-bookworm
    container_name: daq-ingcer-frontend
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    ports:
      - "1420:1420"
    working_dir: /app
    command: bash -c "npm install && npm run dev"
    stdin_open: true
    tty: true

  # Build de producción para Windows (solo cuando necesites generar el .exe)
  build-windows:
    build: .
    container_name: daq-ingcer-build
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - node-modules:/app/node_modules
    working_dir: /app
    command: bash -c "npm install && cargo tauri build --target x86_64-pc-windows-gnu"
    profiles:
      - build

volumes:
  cargo-registry:
  cargo-git:
  node-modules:
